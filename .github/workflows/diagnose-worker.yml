name: Diagnose live worker + price history (one-off)

# Manual-only, read-only diagnostic: reports how much World Cup fixture/event
# data the live worker has recovered, how much real (non-flat) price history
# Supabase holds, and tails recent Fly logs to see what the poll loop is
# actually doing. Zero API-Football calls beyond what the worker itself makes
# on its own schedule, zero writes — safe to run any time.
# See scripts/diagnose-worker.mjs.
on:
  workflow_dispatch:
    inputs:
      run_backfill:
        description: 'Also run scripts/backfill-price-history.mjs after the diagnostic'
        type: boolean
        default: false
      backfill_dry_run:
        description: 'If running the backfill, dry-run it (log counts, write nothing)'
        type: boolean
        default: false
      test_supabase_write:
        description: 'Run scripts/debug-supabase-write.mjs (single write+read-back debug)'
        type: boolean
        default: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run diagnostic
        run: node scripts/diagnose-worker.mjs
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Tail recent Fly logs (30s)
        run: timeout 30 flyctl logs --app footystock --no-tail 2>&1 | tail -200 || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # backfill-price-history.yml (dedicated workflow, same script) isn't
      # dispatchable by name until it exists on the default branch — GitHub's
      # workflow_dispatch API only lists/looks-up workflows registered on
      # main, even though it executes whichever version exists on the ref
      # you pass. Since this file IS already on main, running the backfill
      # as an optional step here (still executing THIS branch's script
      # content, per the ref used to dispatch) works without merging.
      - name: Run backfill (optional)
        if: ${{ inputs.run_backfill }}
        run: node scripts/backfill-price-history.mjs ${{ inputs.backfill_dry_run && '--dry-run' || '' }}
      - name: Test Supabase write (optional debug)
        if: ${{ inputs.test_supabase_write }}
        run: node scripts/debug-supabase-write.mjs
