name: Update World Cup prices

on:
  schedule:
    - cron: '0 6 * * *' # once daily — fundamentals update once a day, see pricing-model.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch real World Cup data and write prices.json
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/update-prices.mjs

      - name: Commit prices.json if it changed
        run: |
          git config user.name "footystock-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- prices.json; then
            echo "No price changes."
            exit 0
          fi
          git add prices.json
          git commit -m "Update prices.json with latest World Cup data"
          git push
