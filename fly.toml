# Deploy from the repo root: fly launch / fly deploy
# Build context is the repo root because the worker needs FootyStock_dc.html
# and scripts/lib/ alongside scripts/live-worker/ — see Dockerfile comments.
app = "footystock-live"
primary_region = "iad"

[build]
  dockerfile = "scripts/live-worker/Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
