# fly.toml — deploy from the repo root: fly deploy
# Build context is the repo root because the worker needs FootyStock_dc.html
# and scripts/lib/ alongside scripts/live-worker/ — see Dockerfile comments.
app = 'footystock'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
